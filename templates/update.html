{% extends "base.html" %}
{% block content %}
<div class="container" my-5>
<h1>Update</h1>
<form method = 'post'>
  <div class="mb-3">
    <label for="exampleInputUsername" class="form-label">Username</label>
    <input type="text" name='username' class="form-control" id="exampleInputUsername" aria-describedby="emailHelp" value='{{user.username}}'>
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Password</label>
    <input type="password" name='password' class="form-control" id="exampleInputPassword1" value='{{user.password}}'>
  </div>
  
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
</div>
{% endblock %}
