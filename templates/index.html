{% extends "base.html" %}

{% block content %}

<div class="container my-5">

    <table class="table table-striped table-bordered">

        <thead class="table-dark">
            <tr>
                <th scope="col">#</th>
                <th scope="col">Username</th>
                <th scope="col">Password</th>
                <th scope="col">Action</th>
            </tr>
        </thead>

        <tbody>
            {% for user in all_users %}
                <tr>
                    <th scope="row">{{loop.index}}</th>
                    <td>{{user.username}}</td>
                    <td>{{user.password}}</td>
                    <td><a href="/update/{{user.sno}}" class="btn btn-primary">Update</a>
                    <a href="/delete/{{user.sno}}" class="btn btn-danger">Delete</a>
                    </td>
                </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}
